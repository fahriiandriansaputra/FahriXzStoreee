<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Support Ticket</title>

<link rel="stylesheet"
href="css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="content">

<h1>
🎫 Ticket Bantuan
</h1>

<textarea

<button onclick="sendTicket()">
Kirim Ticket
</button>

</div>

<h2>
📋 Riwayat Ticket
</h2>

<div id="ticketList"></div>

</div>

</div>

<script type="module"
src="js/ticket.js"></script>

</body>
</html>

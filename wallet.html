<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wallet User</title>

<link rel="stylesheet" href="css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="content">

<h1>
💰 Wallet Saya
</h1>

<div class="stats-grid">

<div class="stats-card">

<h2>
Rp250.000
</h2>

<p>
Saldo Utama
</p>

</div>

<div class="stats-card">

<h2>
Rp50.000
</h2>

<p>
Saldo Pending
</p>

</div>

</div>

<!-- WITHDRAW -->

<div class="tracking-box">

<h2>
🏦 Withdraw
</h2>

<div class="track-form">

<input
type="number"
id="withdrawAmount"
placeholder="Nominal Withdraw">

</div>

<div class="track-form">

<input
type="text"
id="withdrawBank"
placeholder="Bank / E-Wallet">

<input
type="text"
id="withdrawRekening"
placeholder="Nomor Rekening">

</div>

<div class="track-form">

<input
type="text"
id="withdrawName"
placeholder="Nama Penerima">

</div>

<button onclick="requestWithdraw()">
Kirim Withdraw
</button>

</div>

<!-- HISTORY -->

<div class="order-box">

<h2>
📜 Riwayat Withdraw
</h2>

<div id="withdrawHistory"></div>

</div>

</div>

<script type="module" src="js/wallet.js"></script>

<script>

loadWithdrawHistory();

</script>

</body>
</html>

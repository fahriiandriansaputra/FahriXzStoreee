<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Broadcast Promo</title>

<link rel="stylesheet" href="css/admin.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="admin-content">

<h1>
📢 Broadcast Promo
</h1>

<div class="admin-box">

<textarea
id="broadcastMessage"
placeholder="Tulis pesan promo..."></textarea>

<button onclick="sendPromo()">
Kirim Broadcast
</button>

</div>

</div>

<script type="module">

import './js/realtime.js';

window.sendPromo =
function(){

const message =
document.getElementById(
'broadcastMessage'
).value;

if(!message){

alert(
'Isi pesan dulu'
);

return;

}

sendBroadcast(
message
);

};

</script>

</body>
</html>
